<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniel and the Lions' Den - Quiz</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Trebuchet MS', Arial, sans-serif;
    background: linear-gradient(135deg, #fdf6e3 0%, #f5e6c8 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .quiz-card {
    background: #ffffff;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    max-width: 600px;
    width: 100%;
    padding: 32px 28px;
    text-align: center;
  }
  .progress {
    font-size: 14px;
    font-weight: 700;
    color: #b8860b;
    margin-bottom: 10px;
    letter-spacing: 0.5px;
  }
  .progress-bar {
    background: #f0e0c0;
    border-radius: 8px;
    height: 10px;
    overflow: hidden;
    margin-bottom: 22px;
  }
  .progress-fill {
    background: #e8462a;
    height: 100%;
    border-radius: 8px;
    transition: width 0.3s ease;
  }
  h2.question {
    color: #5b3fa0;
    font-size: 1.4em;
    margin: 0 0 24px 0;
    line-height: 1.3;
  }
  .options {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .option-btn {
    background: #f7f3ec;
    border: 2px solid #e0d6c4;
    border-radius: 12px;
    padding: 14px 18px;
    font-size: 1.05em;
    text-align: left;
    cursor: pointer;
    transition: all 0.15s ease;
    color: #333;
  }
  .option-btn:hover:not(:disabled) {
    border-color: #3a7d6e;
    background: #ecf5f1;
  }
  .option-btn:disabled {
    opacity: 0.4;
    text-decoration: line-through;
    cursor: not-allowed;
  }
  .feedback-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }
  .feedback-screen.show { display: flex; }
  .quiz-body.hide { display: none; }
  .feedback-icon { font-size: 4em; }
  .feedback-title { font-size: 1.8em; font-weight: 800; margin: 0; }
  .feedback-title.correct { color: #3a7d6e; }
  .feedback-title.wrong { color: #c0392b; }
  .next-btn {
    background: #3a7d6e;
    color: #ffffff;
    border: none;
    border-radius: 10px;
    padding: 12px 32px;
    font-size: 1.05em;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
  }
  .next-btn.wrong { background: #c0392b; }
  .well-done-screen { display: none; flex-direction: column; align-items: center; gap: 16px; }
  .well-done-screen.show { display: flex; }
  .stars { font-size: 2.5em; letter-spacing: 6px; }
  .well-done-title { font-size: 2.2em; font-weight: 900; color: #e8462a; margin: 0; }
  .well-done-sub { color: #555; font-size: 1.1em; margin: 0; }
  .replay-btn {
    background: #5b3fa0;
    color: #ffffff;
    border: none;
    border-radius: 10px;
    padding: 12px 32px;
    font-size: 1.05em;
    font-weight: 700;
    cursor: pointer;
    margin-top: 10px;
  }
</style>
</head>
<body>

<div class="quiz-card">

  <div id="quizBody" class="quiz-body">
    <div class="progress" id="progressText">Question 1 of 10</div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:10%;"></div></div>
    <h2 class="question" id="questionText"></h2>
    <div class="options" id="optionsContainer"></div>
  </div>

  <div class="feedback-screen" id="feedbackScreen">
    <div class="feedback-icon" id="feedbackIcon">🎉</div>
    <h2 class="feedback-title" id="feedbackTitle">Correct!</h2>
    <button class="next-btn" id="nextBtn">Next Question</button>
  </div>

  <div class="well-done-screen" id="wellDoneScreen">
    <div class="stars">⭐⭐⭐</div>
    <h1 class="well-done-title">Well Done!!</h1>
    <p class="well-done-sub">You know the story of Daniel and the Lions' Den!</p>
    <button class="replay-btn" id="replayBtn">Play Again</button>
  </div>

</div>

<script>
const questions = [
  {
    q: "What was Daniel's job?",
    options: ["He was a farmer", "He was a fisherman", "He was an important helper to the king", "He was a baker"],
    correct: 2
  },
  {
    q: "How did the bad men feel about Daniel?",
    options: ["They thought Daniel was their best friend", "They loved how kind Daniel was", "They were jealous because Daniel was so good at his job", "They wanted Daniel to teach them to pray"],
    correct: 2
  },
  {
    q: "What did the new law say Daniel could NOT do anymore?",
    options: ["Eat his dinner", "Play outside", "Pray to God", "Talk to his friends"],
    correct: 2
  },
  {
    q: "How many times a day did Daniel pray?",
    options: ["One time", "Two times", "Three times", "Ten times"],
    correct: 2
  },
  {
    q: "What happened when Daniel was thrown into the lions' den?",
    options: ["The lions ate him up", "Daniel ran away", "God sent an angel to keep the lions' mouths shut", "The lions fell asleep because they were tired"],
    correct: 2
  },
  {
    q: "What did the king do all night while Daniel was in the lions' den?",
    options: ["Had a big party", "Ate lots of yummy food", "Watched a show", "He couldn't sleep and didn't eat - he was worried about Daniel"],
    correct: 3
  },
  {
    q: "Who protected Daniel from the lions?",
    options: ["The king's soldiers", "Daniel's friends", "God", "A zookeeper"],
    correct: 2
  },
  {
    q: "How did the king feel when Daniel was safe?",
    options: ["Angry and upset", "Very happy and he praised God", "Scared and ran away", "He didn't care at all"],
    correct: 1
  },
  {
    q: "What happened to the bad men who tricked the king?",
    options: ["They were sent to bed early", "The king made them say sorry", "They were thrown into the lions' den themselves", "Nothing happened to them"],
    correct: 2
  },
  {
    q: "What is the big lesson from the story of Daniel?",
    options: ["Lions make good pets", "Always tell the king what he wants to hear", "We can stay faithful to God even when it's hard", "Praying is only for grown-ups"],
    correct: 2
  }
];

let currentQ = 0;
let disabledOptions = [];

const quizBody = document.getElementById('quizBody');
const feedbackScreen = document.getElementById('feedbackScreen');
const wellDoneScreen = document.getElementById('wellDoneScreen');
const questionText = document.getElementById('questionText');
const optionsContainer = document.getElementById('optionsContainer');
const progressText = document.getElementById('progressText');
const progressFill = document.getElementById('progressFill');
const feedbackIcon = document.getElementById('feedbackIcon');
const feedbackTitle = document.getElementById('feedbackTitle');
const nextBtn = document.getElementById('nextBtn');

function shuffle(array) {
  const arr = array.slice();
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

let shuffledOrder = [];

function renderQuestion() {
  const item = questions[currentQ];
  progressText.textContent = `Question ${currentQ + 1} of ${questions.length}`;
  progressFill.style.width = `${((currentQ + 1) / questions.length) * 100}%`;
  questionText.textContent = item.q;
  optionsContainer.innerHTML = '';

  if (shuffledOrder.length === 0) {
    shuffledOrder = shuffle(item.options.map((_, idx) => idx));
  }

  shuffledOrder.forEach((origIdx) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = item.options[origIdx];
    if (disabledOptions.includes(origIdx)) {
      btn.disabled = true;
    }
    btn.addEventListener('click', () => selectOption(origIdx));
    optionsContainer.appendChild(btn);
  });
}

function selectOption(idx) {
  const item = questions[currentQ];
  if (idx === item.correct) {
    showFeedback(true);
  } else {
    disabledOptions.push(idx);
    showFeedback(false);
  }
}

function showFeedback(isCorrect) {
  quizBody.classList.add('hide');
  feedbackScreen.classList.add('show');
  if (isCorrect) {
    feedbackIcon.textContent = '🎉';
    feedbackTitle.textContent = 'Correct!';
    feedbackTitle.className = 'feedback-title correct';
    nextBtn.textContent = currentQ === questions.length - 1 ? 'Finish' : 'Next Question';
    nextBtn.className = 'next-btn';
    nextBtn.onclick = () => {
      feedbackScreen.classList.remove('show');
      currentQ++;
      disabledOptions = [];
      shuffledOrder = [];
      if (currentQ >= questions.length) {
        wellDoneScreen.classList.add('show');
      } else {
        quizBody.classList.remove('hide');
        renderQuestion();
      }
    };
  } else {
    feedbackIcon.textContent = '😅';
    feedbackTitle.textContent = 'Try again!';
    feedbackTitle.className = 'feedback-title wrong';
    nextBtn.textContent = 'Try Again';
    nextBtn.className = 'next-btn wrong';
    nextBtn.onclick = () => {
      feedbackScreen.classList.remove('show');
      quizBody.classList.remove('hide');
      renderQuestion();
    };
  }
}

document.getElementById('replayBtn').addEventListener('click', () => {
  currentQ = 0;
  disabledOptions = [];
  shuffledOrder = [];
  wellDoneScreen.classList.remove('show');
  quizBody.classList.remove('hide');
  renderQuestion();
});

renderQuestion();
</script>

</body>
</html>
