<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Esther the Brave Queen - Quiz</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Trebuchet MS', Arial, sans-serif;
    background: linear-gradient(135deg, #fdf6e3 0%, #f5e6c8 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .quiz-card {
    background: #ffffff;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    max-width: 600px;
    width: 100%;
    padding: 32px 28px;
    text-align: center;
  }
  .progress {
    font-size: 14px;
    font-weight: 700;
    color: #b8860b;
    margin-bottom: 10px;
    letter-spacing: 0.5px;
  }
  .progress-bar {
    background: #f0e0c0;
    border-radius: 8px;
    height: 10px;
    overflow: hidden;
    margin-bottom: 22px;
  }
  .progress-fill {
    background: #e8462a;
    height: 100%;
    border-radius: 8px;
    transition: width 0.3s ease;
  }
  h2.question {
    color: #5b3fa0;
    font-size: 1.4em;
    margin: 0 0 24px 0;
    line-height: 1.3;
  }
  .options {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .option-btn {
    background: #f7f3ec;
    border: 2px solid #e0d6c4;
    border-radius: 12px;
    padding: 14px 18px;
    font-size: 1.05em;
    text-align: left;
    cursor: pointer;
    transition: all 0.15s ease;
    color: #333;
  }
  .option-btn:hover:not(:disabled) {
    border-color: #3a7d6e;
    background: #ecf5f1;
  }
  .option-btn:disabled {
    opacity: 0.4;
    text-decoration: line-through;
    cursor: not-allowed;
  }
  .feedback-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }
  .feedback-screen.show { display: flex; }
  .quiz-body.hide { display: none; }
  .feedback-icon { font-size: 4em; }
  .feedback-title { font-size: 1.8em; font-weight: 800; margin: 0; }
  .feedback-title.correct { color: #3a7d6e; }
  .feedback-title.wrong { color: #c0392b; }
  .next-btn {
    background: #3a7d6e;
    color: #ffffff;
    border: none;
    border-radius: 10px;
    padding: 12px 32px;
    font-size: 1.05em;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
  }
  .next-btn.wrong { background: #c0392b; }
  .well-done-screen { display: none; flex-direction: column; align-items: center; gap: 16px; }
  .well-done-screen.show { display: flex; }
  .stars { font-size: 2.5em; letter-spacing: 6px; }
  .well-done-title { font-size: 2.2em; font-weight: 900; color: #e8462a; margin: 0; }
  .well-done-sub { color: #555; font-size: 1.1em; margin: 0; }
  .replay-btn {
    background: #5b3fa0;
    color: #ffffff;
    border: none;
    border-radius: 10px;
    padding: 12px 32px;
    font-size: 1.05em;
    font-weight: 700;
    cursor: pointer;
    margin-top: 10px;
  }
</style>
</head>
<body>

<div class="quiz-card">

  <div id="quizBody" class="quiz-body">
    <div class="progress" id="progressText">Question 1 of 10</div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:10%;"></div></div>
    <h2 class="question" id="questionText"></h2>
    <div class="options" id="optionsContainer"></div>
  </div>

  <div class="feedback-screen" id="feedbackScreen">
    <div class="feedback-icon" id="feedbackIcon">🎉</div>
    <h2 class="feedback-title" id="feedbackTitle">Correct!</h2>
    <button class="next-btn" id="nextBtn">Next Question</button>
  </div>

  <div class="well-done-screen" id="wellDoneScreen">
    <div class="stars">⭐⭐⭐</div>
    <h1 class="well-done-title">Well Done!!</h1>
    <p class="well-done-sub">You know the story of Esther the brave queen!</p>
    <button class="replay-btn" id="replayBtn">Play Again</button>
  </div>

</div>

<script>
const questions = [
  {
    q: "Who took care of Esther and raised her like his own daughter?",
    options: ["Her mom", "Her cousin Mordecai", "The king", "A teacher"],
    correct: 1
  },
  {
    q: "Who was the king's most important helper, who everyone had to bow to?",
    options: ["Mordecai", "Haman", "A guard", "Esther"],
    correct: 1
  },
  {
    q: "Why wouldn't Mordecai bow down to Haman?",
    options: ["He didn't like bowing", "He only bowed down to God", "He was too tired", "He didn't see Haman"],
    correct: 1
  },
  {
    q: "What did angry Haman decide to do to ALL of Mordecai's people?",
    options: ["Make them work harder", "Send them away", "Try to destroy them", "Take their food"],
    correct: 2
  },
  {
    q: "What did Mordecai ask Queen Esther to do to help save her people?",
    options: ["Hide in the palace", "Talk to the king", "Run away", "Give Haman a gift"],
    correct: 1
  },
  {
    q: "What did Esther ask everyone to do before she went to see the king?",
    options: ["Sing songs", "Fast and pray", "Throw a party", "Clean the palace"],
    correct: 1
  },
  {
    q: "What did Esther invite the king and Haman to?",
    options: ["A walk in the garden", "A special dinner", "A game", "A trip"],
    correct: 1
  },
  {
    q: "What good thing did the king do for Mordecai?",
    options: ["Gave him gold", "Honored him with royal robes and a horse parade", "Made him king", "Gave him a new house"],
    correct: 1
  },
  {
    q: "Who did Esther tell the king was the real enemy?",
    options: ["A guard", "Haman", "Mordecai", "A servant"],
    correct: 1
  },
  {
    q: "How did the Jewish people feel after they were saved?",
    options: ["Sad and scared", "Angry and confused", "Happy, and they celebrated", "Tired and sleepy"],
    correct: 2
  }
];

let currentQ = 0;
let disabledOptions = [];

const quizBody = document.getElementById('quizBody');
const feedbackScreen = document.getElementById('feedbackScreen');
const wellDoneScreen = document.getElementById('wellDoneScreen');
const questionText = document.getElementById('questionText');
const optionsContainer = document.getElementById('optionsContainer');
const progressText = document.getElementById('progressText');
const progressFill = document.getElementById('progressFill');
const feedbackIcon = document.getElementById('feedbackIcon');
const feedbackTitle = document.getElementById('feedbackTitle');
const nextBtn = document.getElementById('nextBtn');

function shuffle(array) {
  const arr = array.slice();
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

let shuffledOrder = [];

function renderQuestion() {
  const item = questions[currentQ];
  progressText.textContent = `Question ${currentQ + 1} of ${questions.length}`;
  progressFill.style.width = `${((currentQ + 1) / questions.length) * 100}%`;
  questionText.textContent = item.q;
  optionsContainer.innerHTML = '';

  if (shuffledOrder.length === 0) {
    shuffledOrder = shuffle(item.options.map((_, idx) => idx));
  }

  shuffledOrder.forEach((origIdx) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = item.options[origIdx];
    if (disabledOptions.includes(origIdx)) {
      btn.disabled = true;
    }
    btn.addEventListener('click', () => selectOption(origIdx));
    optionsContainer.appendChild(btn);
  });
}

function selectOption(idx) {
  const item = questions[currentQ];
  if (idx === item.correct) {
    showFeedback(true);
  } else {
    disabledOptions.push(idx);
    showFeedback(false);
  }
}

function showFeedback(isCorrect) {
  quizBody.classList.add('hide');
  feedbackScreen.classList.add('show');
  if (isCorrect) {
    feedbackIcon.textContent = '🎉';
    feedbackTitle.textContent = 'Correct!';
    feedbackTitle.className = 'feedback-title correct';
    nextBtn.textContent = currentQ === questions.length - 1 ? 'Finish' : 'Next Question';
    nextBtn.className = 'next-btn';
    nextBtn.onclick = () => {
      feedbackScreen.classList.remove('show');
      currentQ++;
      disabledOptions = [];
      shuffledOrder = [];
      if (currentQ >= questions.length) {
        wellDoneScreen.classList.add('show');
      } else {
        quizBody.classList.remove('hide');
        renderQuestion();
      }
    };
  } else {
    feedbackIcon.textContent = '😅';
    feedbackTitle.textContent = 'Try again!';
    feedbackTitle.className = 'feedback-title wrong';
    nextBtn.textContent = 'Try Again';
    nextBtn.className = 'next-btn wrong';
    nextBtn.onclick = () => {
      feedbackScreen.classList.remove('show');
      quizBody.classList.remove('hide');
      renderQuestion();
    };
  }
}

document.getElementById('replayBtn').addEventListener('click', () => {
  currentQ = 0;
  disabledOptions = [];
  shuffledOrder = [];
  wellDoneScreen.classList.remove('show');
  quizBody.classList.remove('hide');
  renderQuestion();
});

renderQuestion();
</script>

</body>
</html>
